<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тауарды өңдеу — QazMarket</title>
  <link rel="stylesheet" href="/css/output.css" />
</head>
<body class="min-h-screen bg-gray-50 text-gray-800">
  <header id="site-header" class="sticky top-0 z-50 border-b border-gray-100 bg-white/95 backdrop-blur"></header>

  <main class="mx-auto max-w-xl px-4 py-10">
    <h1 class="text-2xl font-bold text-qaz-dark" data-i18n="edit.title"></h1>
    <p class="mt-2 text-sm text-gray-500" data-i18n="edit.hint"></p>

    <form id="edit-product-form" class="mt-8 space-y-4 rounded-xl border bg-white p-6 shadow-sm">
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="add.category"></label>
        <select name="categoryId" required class="input-field" id="edit-category"></select>
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="add.nameKk"></label>
        <input type="text" name="nameKk" required class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="add.nameRu"></label>
        <input type="text" name="nameRu" required class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="add.nameEn"></label>
        <input type="text" name="nameEn" class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="add.price"></label>
        <input type="number" name="price" required min="1" class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="add.region"></label>
        <input type="text" name="region" required class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="add.producer"></label>
        <input type="text" name="producerName" required class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="add.image"></label>
        <img id="edit-current-image" src="" alt="" class="mb-3 aspect-square w-40 rounded-lg border object-cover" />
        <input type="file" id="edit-image" name="image" accept="image/jpeg,image/png,image/webp" class="input-field" />
        <p class="mt-1 text-xs text-gray-400" data-i18n="edit.imageHint"></p>
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="add.description"></label>
        <textarea name="descriptionKk" rows="2" class="input-field mb-2" placeholder="Қазақша"></textarea>
        <textarea name="descriptionRu" rows="2" class="input-field mb-2" placeholder="Русский"></textarea>
        <textarea name="descriptionEn" rows="2" class="input-field" placeholder="English"></textarea>
      </div>
      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" name="featured" value="1" class="rounded" />
        <span data-i18n="add.featured"></span>
      </label>
      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" name="inStock" value="1" class="rounded" checked />
        <span data-i18n="edit.inStock"></span>
      </label>
      <p id="edit-error" class="hidden text-sm text-red-600"></p>
      <p id="edit-success" class="hidden text-sm text-green-600"></p>
      <button type="submit" class="btn-primary w-full" data-i18n="edit.submit"></button>
    </form>
    <a href="/manage-products.html" class="mt-6 inline-block text-sm text-qaz-teal hover:underline" data-i18n="manage.title"></a>
  </main>

  <footer id="site-footer" class="mt-16 border-t bg-white"></footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/auth-pages.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/edit-product.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
