<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — QazMarket</title>
  <link rel="stylesheet" href="/css/output.css" />
</head>
<body class="min-h-screen bg-gray-50 text-gray-800">
  <header id="site-header" class="sticky top-0 z-50 border-b border-gray-100 bg-white/95 backdrop-blur"></header>

  <main class="mx-auto max-w-md px-4 py-16">
    <h1 class="text-2xl font-bold text-qaz-dark" data-i18n="auth.registerTitle"></h1>
    <p class="mt-2 text-sm text-gray-500" data-i18n="auth.clientOnly"></p>
    <form id="register-form" class="mt-8 space-y-4 rounded-xl border bg-white p-6 shadow-sm">
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="auth.name"></label>
        <input type="text" name="name" required class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="auth.email"></label>
        <input type="email" name="email" required class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="auth.password"></label>
        <input type="password" name="password" required minlength="6" class="input-field" />
      </div>
      <p id="auth-error" class="hidden text-sm text-red-600"></p>
      <button type="submit" class="btn-primary w-full" data-i18n="auth.registerSubmit"></button>
    </form>
    <p class="mt-6 text-center text-sm text-gray-500">
      <span data-i18n="auth.hasAccount"></span>
      <a href="/login.html" class="text-qaz-teal hover:underline" data-i18n="auth.goLogin"></a>
    </p>
  </main>

  <footer id="site-footer" class="mt-16 border-t bg-white"></footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/auth-pages.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
