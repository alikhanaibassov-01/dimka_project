<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тапсырыс — QazMarket</title>
  <link rel="stylesheet" href="/css/output.css" />
</head>
<body class="min-h-screen bg-gray-50 text-gray-800">
  <header id="site-header" class="sticky top-0 z-50 border-b border-gray-100 bg-white/95 backdrop-blur"></header>

  <main class="mx-auto max-w-4xl px-4 py-10">
    <h1 class="text-3xl font-bold text-qaz-dark" data-i18n="checkout.title"></h1>
    <p class="mt-2 text-sm text-gray-500" data-i18n="checkout.paymentNote"></p>

    <div class="mt-8 grid gap-8 lg:grid-cols-2">
      <form id="checkout-form" class="space-y-4 rounded-xl border bg-white p-6 shadow-sm">
        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="mb-1 block text-sm font-medium" data-i18n="account.lastName"></label>
            <input type="text" name="lastName" required class="input-field" />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium" data-i18n="account.firstName"></label>
            <input type="text" name="firstName" required class="input-field" />
          </div>
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium" data-i18n="account.phone"></label>
          <input type="tel" name="phone" required class="input-field" placeholder="+7 7XX XXX XX XX" />
        </div>

        <fieldset class="space-y-3 rounded-lg border border-gray-100 bg-gray-50 p-4">
          <legend class="px-1 text-sm font-medium" data-i18n="checkout.deliveryMethod"></legend>
          <label class="flex cursor-pointer gap-3 rounded-lg border bg-white p-3 has-[:checked]:border-qaz-teal has-[:checked]:ring-1 has-[:checked]:ring-qaz-teal">
            <input type="radio" name="deliveryMethod" value="delivery" class="mt-1" checked />
            <span>
              <span class="block font-medium" data-i18n="checkout.delivery"></span>
              <span class="text-xs text-gray-500" data-i18n="checkout.deliveryHint"></span>
            </span>
          </label>
          <label class="flex cursor-pointer gap-3 rounded-lg border bg-white p-3 has-[:checked]:border-qaz-teal has-[:checked]:ring-1 has-[:checked]:ring-qaz-teal">
            <input type="radio" name="deliveryMethod" value="pickup" class="mt-1" />
            <span>
              <span class="block font-medium" data-i18n="checkout.pickup"></span>
              <span class="text-xs text-gray-500" data-i18n="checkout.pickupHint"></span>
            </span>
          </label>
        </fieldset>

        <div id="delivery-fields" class="space-y-4">
          <div>
            <label class="mb-1 block text-sm font-medium" data-i18n="checkout.city"></label>
            <input type="text" name="city" class="input-field" />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium" data-i18n="checkout.address"></label>
            <input type="text" name="address" class="input-field" />
          </div>
        </div>

        <div id="pickup-map-checkout" class="hidden"></div>

        <div>
          <label class="mb-1 block text-sm font-medium" data-i18n="checkout.comment"></label>
          <textarea name="comment" rows="3" class="input-field"></textarea>
        </div>

        <fieldset class="space-y-3 rounded-lg border border-gray-100 bg-gray-50 p-4">
          <legend class="px-1 text-sm font-medium" data-i18n="checkout.paymentMethod"></legend>
          <label class="flex cursor-pointer gap-3 rounded-lg border bg-white p-3 has-[:checked]:border-qaz-teal has-[:checked]:ring-1 has-[:checked]:ring-qaz-teal">
            <input type="radio" name="paymentMethod" value="kaspi" class="mt-1" checked />
            <span>
              <span class="block font-semibold text-red-600">Kaspi</span>
              <span class="text-xs text-gray-500" data-i18n="checkout.kaspiHint"></span>
            </span>
          </label>
          <label class="flex cursor-pointer gap-3 rounded-lg border bg-white p-3 has-[:checked]:border-qaz-teal has-[:checked]:ring-1 has-[:checked]:ring-qaz-teal">
            <input type="radio" name="paymentMethod" value="cod" class="mt-1" />
            <span>
              <span class="block font-medium" data-i18n="checkout.cod"></span>
              <span class="text-xs text-gray-500" data-i18n="checkout.codHint"></span>
            </span>
          </label>
        </fieldset>

        <p id="checkout-error" class="hidden text-sm text-red-600"></p>
        <button type="submit" class="btn-primary w-full" data-i18n="checkout.submit"></button>
      </form>

      <div class="rounded-xl border bg-white p-6 shadow-sm">
        <h2 class="font-semibold text-gray-800" data-i18n="cart.title"></h2>
        <div id="checkout-summary" class="mt-4"></div>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="mt-16 border-t bg-white"></footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/pickup-map.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/checkout.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
