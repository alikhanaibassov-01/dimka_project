<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кабинет — QazMarket</title>
  <link rel="stylesheet" href="/css/output.css" />
</head>
<body class="min-h-screen bg-gray-50 text-gray-800">
  <header id="site-header" class="sticky top-0 z-50 border-b border-gray-100 bg-white/95 backdrop-blur"></header>

  <main class="mx-auto max-w-2xl px-4 py-10">
    <h1 class="text-2xl font-bold text-qaz-dark" data-i18n="account.title"></h1>
    <p class="mt-1 text-sm text-gray-500" id="account-email"></p>

    <form id="profile-form" class="mt-6 space-y-4 rounded-xl border bg-white p-6 shadow-sm">
      <h2 class="font-semibold text-gray-800" data-i18n="account.profile"></h2>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="account.lastName"></label>
        <input type="text" name="lastName" required class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="account.firstName"></label>
        <input type="text" name="firstName" required class="input-field" />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium" data-i18n="account.phone"></label>
        <input type="tel" name="phone" required class="input-field" placeholder="+7 7XX XXX XX XX" />
      </div>
      <p id="profile-error" class="hidden text-sm text-red-600"></p>
      <p id="profile-success" class="hidden text-sm text-green-600" data-i18n="account.saved"></p>
      <button type="submit" class="btn-primary" data-i18n="account.save"></button>
    </form>

    <h2 class="mt-10 text-lg font-semibold" data-i18n="account.orders"></h2>
    <div id="account-orders" class="mt-4 space-y-3"></div>
  </main>

  <footer id="site-footer" class="mt-16 border-t bg-white"></footer>

  <script src="/js/i18n.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/auth-pages.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
